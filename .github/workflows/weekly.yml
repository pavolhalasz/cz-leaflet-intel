name: Weekly Leaflet Analysis

on:
  schedule:
    - cron: '0 5 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-leaflet-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run leaflet agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent.py

      - name: Commit and push dashboard
        run: |
          git config --local user.email "leaflet-agent@github.com"
          git config --local user.name "Leaflet Agent"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "📊 Weekly leaflet update - $(date +%Y-%m-%d)"
          git push
